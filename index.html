function gSub(lv){var a,b;if(lv<=1){a=R(20,99);b=R(10,a-1)}else if(lv<=2){a=R(100,999);b=R(10,99)}else if(lv<=3){a=R(200,999);b=R(100,a-1)}else if(lv<=4){a=R(1000,5000);b=R(100,999)}else{a=R(2000,10000);b=R(1000,a-1)}var ans=a-b;return{q:a+” - “+b+” = ?”,ans:ans,ch:mc(ans,0,10000),hint:“What + “+b+” = “+a+”?”,think:“Check: answer + “+b+” = “+a,tp:“n”}}
function gMul(lv){var a,b;if(lv<=1){a=R(2,5);b=R(2,5)}else if(lv<=2){a=R(2,9);b=R(2,9)}else if(lv<=3){a=R(6,9);b=R(6,9)}else if(lv<=4){a=R(10,20);b=R(2,9)}else{a=R(11,99);b=R(2,9)}var ans=a*b;return{q:lv>=2?a+” bags, “+b+” apples each. Total?”:a+” x “+b+” = ?”,ans:ans,ch:mc(ans,0,1000),hint:a+” groups of “+b+”. Skip count!”,think:“Does “+a+“x”+b+” = “+b+“x”+a+”?”,tp:“n”}}
function gDiv(lv){var d,q2;if(lv<=1){d=R(2,5);q2=R(2,5)}else if(lv<=2){d=R(2,9);q2=R(2,9)}else if(lv<=3){d=R(3,9);q2=R(5,12)}else if(lv<=4){d=R(2,9);q2=R(10,30)}else{d=R(4,9);q2=R(10,99)}var dv=d*q2+(lv>=4?R(0,d-1):0);var ans=Math.floor(dv/d);return{q:dv+” / “+d+” = ?”,ans:ans,ch:mc(ans,0,500),hint:d+” x ? is close to “+dv,think:“Write a multiplication fact!”,tp:“n”}}

TOPICS.forEach(function(t){

else if(scr===“levels”&&topic){

else if(scr===“quiz”&&qs.length>0){

htm+=’<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><span style="font-size:14px">’+(topic?topic.icon:””)+’</span><span style="font-size:13px;font-weight:700;color:rgba(255,255,255,.6)">’+(isRev?“Review”:(topic?topic.name:””)+” Level “+lvl)+’</span></div>’;
htm+=’<div style="background:rgba(255,255,255,.07);border-radius:24px;padding:24px;margin-bottom:20px;border:1px solid rgba(255,255,255,.08);min-height:100px">’;
if(tricky&&!done)htm+=’<div style="background:rgba(255,165,0,.15);border:1px solid rgba(255,165,0,.3);border-radius:12px;padding:8px 14px;margin-bottom:14px;font-size:13px;font-weight:700;color:#FFA500">WARNING: Choices are very close! Think carefully!</div>’;
htm+=’<div style="font-size:18px;font-weight:700;line-height:1.5;text-align:center">’+q.q+’</div>’;
if(q.fv){htm+=’<div style="display:flex;justify-content:center;gap:4px;margin-top:16px">’;for(var i=0;i<q.fv.d;i++)htm+=’<div style=“width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:’+(i<q.fv.n?“rgba(102,126,234,.6)”:“rgba(255,255,255,.08)”)+’”></div>’;htm+=’</div>’;}
if(q.bar){htm+=’<div style="margin-top:16px;padding:12px;background:rgba(255,255,255,.05);border-radius:12px"><div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px;text-align:center">Bar Model</div><div style="display:flex;gap:4px;height:28px">’;q.bar.p.forEach(function(v,i){htm+=’<div style=“flex:’+v+’;background:’+(i===0?“rgba(102,126,234,.4)”:“rgba(240,147,251,.4)”)+’;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700”>’+(q.bar.l[i]||”?”)+’</div>’});htm+=’</div></div>’;}
htm+=’</div>’;
if(!done){htm+=’<div style="display:flex;gap:10px;margin-bottom:16px"><button id="hbtn" style="background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);color:#FFD700;border-radius:14px;padding:10px 16px;font-size:13px;font-weight:700">’+(showHint?“Hide Hint”:“Hint?”)+’</button><button id="dbtn" style="background:rgba(102,126,234,.15);border:1px solid rgba(102,126,234,.3);color:#a8b5ff;border-radius:14px;padding:10px 16px;font-size:13px;font-weight:700">Think Deeper</button></div>’;}
if(showHint)htm+=’<div style="background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:16px;padding:16px;margin-bottom:12px;font-size:14px;line-height:1.6;color:rgba(255,255,255,.85)">Hint: ‘+q.hint+’</div>’;
if(showDeep)htm+=’<div style="background:rgba(102,126,234,.1);border:1px solid rgba(102,126,234,.2);border-radius:16px;padding:16px;margin-bottom:12px;font-size:14px;line-height:1.6;color:rgba(255,255,255,.8)">Think: ‘+q.think+’</div>’;

htm+=’<div id="choices">’;
q.ch.forEach(function(c,i){var isSel=done&&(picked===c||String(picked)===String(c));var isAns=q.tp===“n”?c===q.ans:String(c)===String(q.ans);var bg=“rgba(255,255,255,.06)”,bc=“rgba(255,255,255,.08)”;if(done&&isSel){bg=isAns?“rgba(46,213,115,.2)”:“rgba(255,71,87,.2)”;bc=isAns?”#2ed573”:”#ff4757”}else if(done&&isAns){bg=“rgba(46,213,115,.15)”;bc=”#2ed573”}htm+=’<button class="cb" data-i="'+i+'" style="width:100%;padding:16px 20px;border-radius:16px;border:2px solid '+bc+';background:'+bg+';color:#fff;font-size:16px;font-weight:600;text-align:center;margin-bottom:10px">’+(q.tp===“t”?c:(typeof c===“number”?c.toLocaleString():c))+’</button>’});
htm+=’</div>’;
if(done){htm+=’<div style="animation:slideUp .3s;margin-top:12px"><div style=“background:’+(isOk?“rgba(46,213,115,.1)”:“rgba(255,71,87,.1)”)+’;border:1px solid ‘+(isOk?“rgba(46,213,115,.3)”:“rgba(255,71,87,.3)”)+’;border-radius:16px;padding:16px;text-align:center;margin-bottom:12px”><div style="font-size:28px;margin-bottom:8px">’+(isOk?“Correct!”:“Try Again!”)+’</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">’+(isOk?CHEERS[R(0,CHEERS.length-1)]:“Not quite. Keep learning!”)+’</div>’;if(!isOk)htm+=’<div style="font-size:13px;color:rgba(255,255,255,.6);margin-top:8px">Answer: <strong>’+(typeof q.ans===“number”?q.ans:q.ans)+’</strong><br><span style="font-size:11px">Coming back for review!</span></div>’;if(isOk&&combo>=3)htm+=’<div style="font-size:12px;color:#FFD700;margin-top:4px">’+combo+‘x Combo! +’+(combo>=5?15:5)+’ XP</div>’;htm+=’</div>’;
if(isOk)htm+=’<div style="background:rgba(102,126,234,.1);border:1px solid rgba(102,126,234,.2);border-radius:16px;padding:16px;margin-bottom:12px;font-size:14px;line-height:1.6;color:rgba(255,255,255,.8)">Go deeper: ‘+q.think+’</div>’;
else htm+=’<div style="background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:16px;padding:16px;margin-bottom:12px;font-size:14px;line-height:1.6;color:rgba(255,255,255,.85)">How to solve: ‘+q.hint+’</div>’;
htm+=’<button id="nxt" style="width:100%;padding:16px;border-radius:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:16px;font-weight:700;margin-top:10px;box-shadow:0 4px 20px rgba(102,126,234,.4)">’+(ci+1>=qs.length?“See Results”:“Next Question”)+’</button></div>’;}
if(combo>=3&&!done)htm=’<div style="position:fixed;top:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#f093fb,#f5576c);border-radius:20px;padding:8px 20px;font-size:14px;font-weight:800;z-index:100">’+combo+‘x Combo!</div>’+htm;
$.innerHTML=htm;
document.getElementById(“qx”).onclick=function(){clearInterval(tmr);scr=“home”;draw()};

}

else if(scr===“results”){
var pct=stats.t?Math.round((stats.c/stats.t)*100):0,st=pct>=90?3:pct>=70?2:pct>=50?1:0;
var msg=[“Keep practicing!”,“Good effort!”,“Great job!”,“Outstanding!”][st];
var stars=””;for(var i=0;i<3;i++)stars+=’<span style="font-size:32px;opacity:'+(i<st?1:.2)+'">*</span>’;
$.innerHTML=’<div style="animation:slideUp .4s"><div style="text-align:center"><div style="font-size:64px;margin-bottom:12px;animation:celebrate .6s">’+(pct>=90?“Trophy”:pct>=70?“Star”:“Good”)+’</div><div style="font-size:24px;font-weight:900;margin-bottom:8px">Session Complete!</div><div style="font-size:14px;color:rgba(255,255,255,.6);margin-bottom:24px">’+msg+’</div></div><div style="background:rgba(255,255,255,.07);border-radius:24px;padding:28px;text-align:center;border:1px solid rgba(255,255,255,.08)"><div style="font-size:40px;margin-bottom:4px">’+stars+’</div><div style="display:flex;justify-content:space-around;margin:20px 0"><div style="text-align:center"><div style="font-size:28px;font-weight:800;color:#667eea">’+stats.c+’/’+stats.t+’</div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:4px">Correct</div></div><div style="text-align:center"><div style="font-size:28px;font-weight:800;color:#667eea">’+pct+’%</div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:4px">Accuracy</div></div><div style="text-align:center"><div style="font-size:28px;font-weight:800;color:#667eea">+’+stats.xp+’</div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:4px">XP</div></div></div><div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;padding:10px 16px;background:rgba(255,215,0,.1);border-radius:12px"><span style="font-size:14px;font-weight:700;color:#FFD700">+’+(stats.c*3+(stats.t-stats.c))+’ coins</span></div></div><div style="text-align:center;margin:20px 0"><span style="font-size:40px">’+p.e+’</span><div style="font-size:13px;color:rgba(255,255,255,.5);margin-top:4px">Keep earning XP!</div></div>’+(stats.t-stats.c>0?’<div style="background:rgba(255,107,107,.1);border-radius:16px;padding:16px;margin-bottom:16px;text-align:center"><div style="font-size:14px;font-weight:700;margin-bottom:4px">Review Added</div><div style="font-size:12px;color:rgba(255,255,255,.5)">’+(stats.t-stats.c)+’ coming back tomorrow!</div></div>’:’’)+’<button id="pa" style="width:100%;padding:16px;border-radius:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:16px;font-weight:700;box-shadow:0 4px 20px rgba(102,126,234,.4)">Play Again</button><button id="bh" style="width:100%;padding:16px;border-radius:16px;background:rgba(255,255,255,.08);color:#fff;font-size:16px;font-weight:700;margin-top:10px">Home</button></div>’;
document.getElementById(“pa”).onclick=function(){startQ(topic,lvl,isRev)};
document.getElementById(“bh”).onclick=function(){scr=“home”;draw()};
}
}catch(err){$.innerHTML=’<div style="padding:40px;color:red;font-size:14px">Error: ‘+err.message+’<br>’+err.stack+’</div>’;}
}

function startQ(tp,lv,rev){topic=tp;lvl=lv;isRev=rev||false;if(rev){qs=[];(D.rq||[]).forEach(function(r){if(new Date(r.rd)<=new Date()&&qs.length<8){var g=(GEN[r.tid]||gAdd)(r.lv);g.rid=r.id;qs.push(g)}});if(!qs.length){scr=“home”;draw();return}}else{qs=[];for(var i=0;i<8;i++)qs.push((GEN[tp.id]||gAdd)(lv))}ci=0;picked=null;done=false;showHint=false;showDeep=false;stats={c:0,t:0,xp:0};combo=0;timer=0;scr=“quiz”;clearInterval(tmr);tmr=setInterval(function(){timer++;var t=document.getElementById(“tmr”);if(t)t.textContent=Math.floor(timer/60)+”:”+p2(timer%60)},1000);draw()}

function doAns(val){if(done)return;picked=val;done=true;var q=qs[ci],ok=q.tp===“n”?val===q.ans:String(val)===String(q.ans);combo=ok?combo+1:0;if(ok)sndOk();else sndNo();var xg=ok?15:2;if(combo>=3)xg+=5;if(combo>=5)xg+=10;if(!showHint&&ok)xg+=5;stats={c:stats.c+(ok?1:0),t:stats.t+1,xp:stats.xp+xg};var today=new Date().toDateString();D.xp=(D.xp||0)+xg;D.coins=(D.coins||0)+(ok?3:1);D.answered=(D.answered||0)+1;if(ok){D.correct=(D.correct||0)+1;D.streak=(D.streak||0)+1;D.best=Math.max(D.best||0,D.streak)}else{D.streak=0;if(!D.rq)D.rq=[];D.rq.push({id:Date.now(),tid:topic.id,lv:lvl,q:q.q,ad:today,rd:new Date(Date.now()+86400000).toDateString()})}if(!D.tp)D.tp={};var key=isRev?“review”:topic.id;if(!D.tp[key])D.tp[key]={};if(!D.tp[key][lvl])D.tp[key][lvl]={c:0,t:0};D.tp[key][lvl]={c:D.tp[key][lvl].c+(ok?1:0),t:D.tp[key][lvl].t+1};if(!D.dl)D.dl={};D.dl[today]=(D.dl[today]||0)+3;var nd=xpNeed(D.level||1);if(D.xp>=nd){D.level=(D.level||1)+1;D.xp-=nd}if(D.lastDay!==today){var yd=new Date(Date.now()-86400000).toDateString();D.days=D.lastDay===yd?(D.days||0)+1:1;D.lastDay=today}if(isRev&&ok&&q.rid)D.rq=(D.rq||[]).filter(function(r){return r.id!==q.rid});save(D);draw()}

function doNext(){if(ci+1>=qs.length){clearInterval(tmr);scr=“results”;draw();return}ci++;picked=null;done=false;showHint=false;showDeep=false;draw()}

draw();
})();
</script>
