const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _actx = null;
function getACtx() {
if (!_actx) _actx = new AudioCtx();
if (_actx.state === ‘suspended’) _actx.resume();
return _actx;
}
function playCorrectSound() {
try {
const ctx = getACtx();
// happy ascending arpeggio
[523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.type = ‘sine’;
osc.frequency.value = freq;
gain.gain.setValueAtTime(0.18, ctx.currentTime + i * 0.09);
gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.09 + 0.25);
osc.connect(gain); gain.connect(ctx.destination);
osc.start(ctx.currentTime + i * 0.09);
osc.stop(ctx.currentTime + i * 0.09 + 0.3);
});
} catch(e){}
}
function playWrongSound() {
try {
const ctx = getACtx();
// low “bu bu” sound
[180, 140].forEach((freq, i) => {
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.type = ‘triangle’;
osc.frequency.value = freq;
gain.gain.setValueAtTime(0.22, ctx.currentTime + i * 0.18);
gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.22);
osc.connect(gain); gain.connect(ctx.destination);
osc.start(ctx.currentTime + i * 0.18);
osc.stop(ctx.currentTime + i * 0.18 + 0.25);
});
} catch(e){}
}

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuffle(arr){const a=[…arr];for(let i=a.length-1;i>0;i–){const j=rand(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}

// Generic numeric choice generator — ensures unique, reasonable distractors
function makeChoices(correct, lo, hi) {
const s = new Set([correct]);
let t = 0;
// Generate close distractors (within ±5) and wider ones
while (s.size < 4 && t++ < 80) {
let w;
if (Math.random() < 0.5) {
// close distractor
w = correct + rand(-5, 5);
} else {
w = rand(Math.max(lo, correct - 20), Math.min(hi, correct + 20));
}
if (w !== correct && w >= lo) s.add(w);
}
while (s.size < 4) s.add(correct + s.size * 7);
return shuffle([…s]);
}

// Detect if choices have “easy mistake” close distractors (within ±1 or ±2 of answer)
function hasCloseDistractors(choices, answer) {
if (typeof answer !== ‘number’) return false;
let closeCount = 0;
for (const c of choices) {
if (c !== answer && typeof c === ‘number’ && Math.abs(c - answer) <= 2) closeCount++;
}
return closeCount >= 2;
}

// ═══ FRACTIONS — FIXED: choices show proper fractions ═══
function genFrac(lv) {
if (lv <= 2) {
const den = [2,3,4,5,6,8][rand(0,5)];
const num = rand(1, den-1);
// Answer is the fraction string, choices are fraction strings
const ans = `${num}/${den}`;
const distractors = new Set([ans]);
// Generate plausible wrong fractions
for (let i = 1; i <= den && distractors.size < 4; i++) {
if (i !== num) distractors.add(`${i}/${den}`);
}
// If still need more, add with different denominators
const altDens = [2,3,4,5,6,8].filter(d => d !== den);
let t = 0;
while (distractors.size < 4 && t < 10) {
const ad = altDens[rand(0, altDens.length-1)];
const an = rand(1, ad-1);
distractors.add(`${an}/${ad}`);
t++;
}
return {
q: `What fraction is shaded? (${num} of ${den} parts)`,
ans,
choices: shuffle([…distractors]),
hint: “Numerator (top) = shaded parts. Denominator (bottom) = total parts.”,
think: “Shade one more — what fraction now?”,
type: “txt”,
fracVis: { num, den }
};
}
if (lv <= 3) {
const den = [3,4,5,6,8][rand(0,4)];
const n1 = rand(1, den-2);
const n2 = rand(1, den-n1);
const ansNum = n1 + n2;
const ans = `${ansNum}/${den}`;
const distractors = new Set([ans]);
// wrong answers: off by 1 numerator, or wrong operation
[ansNum-1, ansNum+1, n1, n2, Math.abs(n1-n2)].forEach(v => {
if (v > 0 && v <= den && `${v}/${den}` !== ans) distractors.add(`${v}/${den}`);
});
while (distractors.size < 4) distractors.add(`${rand(1,den)}/${den}`);
return {
q: `${n1}/${den} + ${n2}/${den} = ?`,
ans,
choices: shuffle([…distractors]),
hint: “Same denominator? Just add the numerators!”,
think: “Can you simplify the answer?”,
type: “txt”
};
}
if (lv <= 4) {
const den = [3,4,5,6,8][rand(0,4)];
const n1 = rand(2, den-1);
const n2 = rand(1, n1-1);
const ansNum = n1 - n2;
const ans = `${ansNum}/${den}`;
const distractors = new Set([ans]);
[ansNum+1, ansNum+2, n1, n2, n1+n2].forEach(v => {
if (v > 0 && v <= den && `${v}/${den}` !== ans) distractors.add(`${v}/${den}`);
});
while (distractors.size < 4) distractors.add(`${rand(1,den)}/${den}`);
return {
q: `${n1}/${den} − ${n2}/${den} = ?`,
ans,
choices: shuffle([…distractors]),
hint: “Same denominator? Just subtract the numerators!”,
think: “Draw a bar model to show this!”,
type: “txt”
};
}
// Level 5: equivalent fractions
const pairs = [[2,4],[2,6],[3,6],[2,8],[4,8]];
const [sm,bg] = pairs[rand(0,pairs.length-1)];
const en = rand(1, Math.max(1,sm-1));
const ansNum = en * (bg/sm);
const ans = `${ansNum}/${bg}`;
const distractors = new Set([ans]);
[ansNum-1, ansNum+1, en, en+1, ansNum+2].forEach(v => {
if (v > 0 && v <= bg && `${v}/${bg}` !== ans) distractors.add(`${v}/${bg}`);
});
while (distractors.size < 4) distractors.add(`${rand(1,bg)}/${bg}`);
return {
q: `${en}/${sm} = ?/${bg}  (Find the equivalent fraction)`,
ans,
choices: shuffle([…distractors]),
hint: “Multiply top and bottom by the same number!”,
think: “Find more equivalent fractions!”,
type: “txt”
};
}

          <div style={{fontSize:64,marginBottom:12,animation:"celebrate .6s"}}>{pct>=90?"🏆":pct>=70?"🌟":pct>=50?"👍":"💪"}</div>
          <div style={{fontSize:24,fontWeight:900,marginBottom:8}}>Session Complete!</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,.6)",marginBottom:24}}>{msg}</div>
        </div>
        <div style={{background:"rgba(255,255,255,.07)",borderRadius:24,padding:28,textAlign:"center",border:"1px solid rgba(255,255,255,.08)"}}>
          <div style={{fontSize:40,marginBottom:4}}>{[0,1,2].map(i=><span key={i} style={{fontSize:32,opacity:i<stars?1:.2}}>⭐</span>)}</div>
          <div style={{display:"flex",justifyContent:"space-around",margin:"20px 0"}}>
            {[{n:`${stats.c}/${stats.t}`,l:"Correct"},{n:`${pct}%`,l:"Accuracy"},{n:`+${stats.xp}`,l:"XP Earned"}].map((s,i)=>
              <div key={i} style={{textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:800,background:"linear-gradient(135deg,#667eea,#f093fb)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{s.n}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginTop:4}}>{s.l}</div>
              </div>
            )}
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:8,padding:"10px 16px",background:"rgba(255,215,0,.1)",borderRadius:12}}>
            <span>🪙</span><span style={{fontSize:14,fontWeight:700,color:"#FFD700"}}>+{stats.c*3+(stats.t-stats.c)} coins</span>
          </div>
        </div>
        <div style={{textAlign:"center",margin:"20px 0"}}>
          <span style={{fontSize:40}}>{pet.e}</span>
          <div style={{fontSize:13,color:"rgba(255,255,255,.5)",marginTop:4}}>Keep earning XP to evolve {pet.n}!</div>
        </div>
        {stats.t-stats.c>0&&<div style={{background:"rgba(255,107,107,.1)",borderRadius:16,padding:16,marginBottom:16,textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>📝 Review Added</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.5)"}}>{stats.t-stats.c} problem(s) will come back tomorrow!</div>
        </div>}
        <button onClick={()=>go(topic,lvl,rev)} style={{width:"100%",padding:16,borderRadius:16,background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",fontSize:16,fontWeight:700,boxShadow:"0 4px 20px rgba(102,126,234,.4)"}}>Play Again 🔄</button>
        <button onClick={()=>setScr("home")} style={{width:"100%",padding:16,borderRadius:16,background:"rgba(255,255,255,.08)",color:"#fff",fontSize:16,fontWeight:700,marginTop:10}}>Back to Home</button>
      </div>;
    })()}

  </div>
</div>
